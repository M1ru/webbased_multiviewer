<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MultiViewer cell</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      #app {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { MultiViewer } from '../dist/multiviewer.js';

      // Assets (rhwp_bg.wasm, mv-pdf.worker.js) live next to the built bundle.
      const assetsPath = new URL('../dist/', location.href).href;

      // Optional conversion agent, configured via query params:
      //   viewer.html?agent=http://127.0.0.1:7391&convert=doc,ppt
      const q = new URLSearchParams(location.search);
      const agent = q.get('agent');
      const converter = agent
        ? { url: agent, formats: (q.get('convert') || 'doc,ppt').split(',').map((s) => s.trim()).filter(Boolean) }
        : undefined;

      const viewer = new MultiViewer({ container: '#app', assetsPath, converter });

      // Programmatic hook (used by the smoke test).
      window.__mv = {
        render: (fileOrBytes, name) => viewer.render(fileOrBytes, { filename: name }),
      };

      // Iframe embedding: the parent grid posts a File to each cell.
      window.addEventListener('message', async (e) => {
        const d = e.data;
        if (!d || d.type !== 'mv:render') return;
        try {
          const det = await viewer.render(d.file, { filename: d.file?.name });
          (e.source || window.parent)?.postMessage({ type: 'mv:done', name: d.file?.name, format: det.format }, '*');
        } catch (err) {
          (e.source || window.parent)?.postMessage({ type: 'mv:error', error: String(err) }, '*');
        }
      });

      window.parent?.postMessage({ type: 'mv:ready' }, '*');
    </script>
  </body>
</html>
