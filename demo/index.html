<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MultiViewer — 2×3 그리드 데모</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      }
      body {
        margin: 0;
        background: #eceef1;
        color: #1f2329;
      }
      header {
        padding: 12px 16px;
        background: #fff;
        border-bottom: 1px solid #d7dae0;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      header h1 {
        font-size: 15px;
        margin: 0;
      }
      header .hint {
        font-size: 12px;
        color: #6b7280;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 1fr);
        gap: 10px;
        padding: 10px;
        height: calc(100vh - 54px);
        box-sizing: border-box;
      }
      .cell {
        position: relative;
        background: #fff;
        border: 1px solid #d7dae0;
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .cell__label {
        font-size: 11px;
        color: #6b7280;
        padding: 3px 8px;
        border-bottom: 1px solid #eef0f3;
        background: #fafbfc;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .cell iframe {
        border: 0;
        width: 100%;
        flex: 1 1 auto;
      }
      .cell--empty::after {
        content: '빈 칸';
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: #b7bcc4;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>MultiViewer</h1>
      <input id="picker" type="file" multiple />
      <span class="hint">파일을 최대 6개까지 선택하면 각 칸(iframe)에 형식별 뷰어로 표시됩니다.</span>
    </header>
    <div class="grid" id="grid"></div>

    <script>
      const grid = document.getElementById('grid');
      const cells = [];
      for (let i = 0; i < 6; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell cell--empty';
        const label = document.createElement('div');
        label.className = 'cell__label';
        label.textContent = `칸 ${i + 1}`;
        const iframe = document.createElement('iframe');
        iframe.src = 'viewer.html';
        cell.append(label, iframe);
        grid.append(cell);
        cells.push({ cell, label, iframe, ready: false, pending: null });
        iframe.addEventListener('load', () => {
          cells[i].ready = true;
        });
      }

      // Each cell is an independent iframe running its own MultiViewer instance,
      // exactly like a real multi-file grid. Files are handed over by postMessage.
      window.addEventListener('message', (e) => {
        if (e.data?.type === 'mv:ready') {
          const c = cells.find((x) => x.iframe.contentWindow === e.source);
          if (c && c.pending) {
            c.iframe.contentWindow.postMessage({ type: 'mv:render', file: c.pending }, '*');
            c.pending = null;
          }
        }
      });

      document.getElementById('picker').addEventListener('change', (e) => {
        const files = [...e.target.files].slice(0, 6);
        cells.forEach((c, i) => {
          const file = files[i];
          c.cell.classList.toggle('cell--empty', !file);
          c.label.textContent = file ? `칸 ${i + 1} · ${file.name}` : `칸 ${i + 1}`;
          if (!file) return;
          const send = () => c.iframe.contentWindow.postMessage({ type: 'mv:render', file }, '*');
          if (c.ready) send();
          else c.pending = file;
        });
      });
    </script>
  </body>
</html>
