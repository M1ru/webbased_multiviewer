# .github/workflows/deploy-pages.yml
# main 브랜치에 push할 때마다 빌드 후 GitHub Pages로 데모를 배포합니다.
# 배포 구조:
#   /            → demo/ 로 리다이렉트
#   /demo/       → 2×3 그리드 데모 (index.html, viewer.html)
#   /dist/       → 빌드 산출물 (multiviewer.js, rhwp_bg.wasm, mv-pdf.worker.js 등)
name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Actions 탭에서 수동 실행도 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # 테스트용 playwright 브라우저 다운로드 생략 (빌드에 불필요)
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Build library + pdf worker
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r demo _site/demo
          cp -r dist _site/dist
          # 소스맵은 배포 용량만 차지하므로 제외 (원하면 이 줄 삭제)
          find _site/dist -name '*.map' -delete
          # 루트 접속 시 데모로 리다이렉트
          cat > _site/index.html <<'EOF'
          <!doctype html><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./demo/">
          <a href="./demo/">MultiViewer 데모로 이동</a>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
